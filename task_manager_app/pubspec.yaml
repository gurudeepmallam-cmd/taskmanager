name: task_manager_app
description: A Flutter Task Manager App using Back4App BaaS

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Parse SDK for Back4App
  parse_server_sdk_flutter: ^8.0.0

  # UI & UX
  google_fonts: ^6.1.0
  flutter_slidable: ^3.1.0
  lottie: ^3.0.0
  animate_do: ^3.3.4
  flutter_staggered_animations: ^1.1.1

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
